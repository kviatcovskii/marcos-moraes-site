:root {
  --paper: #E7E1D2; --paper-raised: #F4F0E6; --ink: #18150E; --muted: #5C5645;
  --accent: #8B2A20; --accent-ink: #6B1F18; --line: #C7BEA4; --gold: #A9822E;
  --serif: 'Fraunces', Georgia, serif; --sans: 'Archivo', 'Segoe UI', sans-serif;
  --mono: 'JetBrains Mono', 'Consolas', monospace;
}
@media (prefers-color-scheme: dark) {
  :root { --paper: #100E0A; --paper-raised: #1B1712; --ink: #EDE7D6; --muted: #A79C82;
    --accent: #C23F30; --accent-ink: #E2695A; --line: #332C1F; --gold: #C79A44; }
}
:root[data-theme="dark"] { --paper: #100E0A; --paper-raised: #1B1712; --ink: #EDE7D6; --muted: #A79C82;
  --accent: #C23F30; --accent-ink: #E2695A; --line: #332C1F; --gold: #C79A44; }
:root[data-theme="light"] { --paper: #E7E1D2; --paper-raised: #F4F0E6; --ink: #18150E; --muted: #5C5645;
  --accent: #8B2A20; --accent-ink: #6B1F18; --line: #C7BEA4; --gold: #A9822E; }

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body { background: var(--paper); color: var(--ink); font-family: var(--sans); line-height: 1.6; -webkit-font-smoothing: antialiased; }
a { color: var(--accent-ink); }
::selection { background: var(--gold); color: var(--paper); }

.meter-row { display: flex; gap: 18px; font-family: var(--mono); font-size: 11px; letter-spacing: .06em;
  color: var(--muted); text-transform: uppercase; font-variant-numeric: tabular-nums; flex-wrap: wrap; }
.meter-row span::before { content: "· "; opacity: .5; }
.meter-row span:first-child::before { content: ""; }

.corner-frame { position: relative; border: 1px solid var(--line); }
.corner-frame::before, .corner-frame::after,
.corner-frame .c2::before, .corner-frame .c2::after {
  content: ""; position: absolute; width: 22px; height: 22px; border: 2px solid var(--gold); }
.corner-frame::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
.corner-frame::after { top: -1px; right: -1px; border-left: none; border-bottom: none; }
.corner-frame .c2::before { bottom: -1px; left: -1px; border-right: none; border-top: none; }
.corner-frame .c2::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

.leader-rule { height: 10px; margin: 0; background: repeating-linear-gradient(90deg, var(--line) 0 1.5px, transparent 1.5px 14px); }

/* ---- EBOOK PAGE ---- */
.sheet { background: var(--paper-raised); max-width: 720px; margin: 0 auto 28px; padding: 76px 72px;
  box-shadow: 0 1px 2px rgba(0,0,0,.15), 0 24px 48px -24px rgba(0,0,0,.35); }
.cover-sheet { text-align: center; padding: 120px 72px; }
.cover-sheet .kicker { font-family: var(--mono); font-size: 12px; letter-spacing: .18em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 34px; }
.cover-sheet h1 { font-family: var(--serif); font-weight: 340; font-size: 54px; line-height: 1.04;
  letter-spacing: -0.01em; margin: 0 0 26px; text-wrap: balance; }
.cover-sheet h1 em { font-style: italic; font-weight: 500; color: var(--accent-ink); }
.cover-sheet .sub { font-size: 16.5px; color: var(--muted); max-width: 40ch; margin: 0 auto 50px; }
.cover-sheet .byline { font-family: var(--mono); font-size: 12.5px; letter-spacing: .08em; color: var(--ink);
  display: inline-flex; align-items: center; gap: 10px; }
.cover-sheet .byline::before { content: ""; width: 7px; height: 7px; background: var(--accent); display: inline-block; }

.toc-page ol { list-style: none; padding: 0; margin: 0; font-family: var(--mono); font-size: 14px; }
.toc-page li { display: flex; gap: 18px; padding: 13px 0; border-bottom: 1px dotted var(--line); }
.toc-page .tc-sm { color: var(--gold); font-weight: 700; }
.toc-page .n { margin-left: auto; color: var(--muted); }

.chapter-slate { display: flex; align-items: flex-end; gap: 26px; margin-bottom: 40px; }
.tc { font-family: var(--mono); font-weight: 700; font-size: 52px; color: var(--gold); line-height: 1;
  letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
.chapter-head h2 { font-family: var(--serif); font-weight: 500; font-style: italic; font-size: 30px;
  margin: 0 0 6px; letter-spacing: -0.005em; text-wrap: balance; }
.chapter-head .slug { font-family: var(--mono); font-size: 10.5px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); }

.sheet p.lead { font-size: 18.5px; font-family: var(--serif); font-weight: 400; color: var(--ink); line-height: 1.55; }
.sheet p { font-size: 15.5px; line-height: 1.75; color: var(--ink); max-width: 62ch; }
.sheet p.body-muted { color: var(--muted); }
.sheet h3 { font-family: var(--sans); font-weight: 700; font-size: 14px; letter-spacing: .04em; margin: 32px 0 12px; color: var(--ink); }

.pull { margin: 34px 0; padding: 4px 0 4px 26px; border-left: 2px solid var(--accent); }
.pull p { font-family: var(--serif); font-style: italic; font-weight: 500; font-size: 22px; color: var(--accent-ink);
  line-height: 1.35; margin: 0; text-wrap: balance; }

.stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--line);
  border: 1px solid var(--line); margin: 24px 0; }
.stat-cell { background: var(--paper); padding: 18px 16px; }
.stat-cell .v { font-family: var(--serif); font-size: 30px; font-weight: 600; color: var(--accent-ink); line-height: 1; }
.stat-cell .l { font-family: var(--mono); font-size: 10px; letter-spacing: .04em; color: var(--muted); margin-top: 8px; display: block; }

.checklist { list-style: none; padding: 0; margin: 22px 0; }
.checklist li { display: flex; gap: 12px; align-items: baseline; padding: 9px 0; border-bottom: 1px solid var(--line); font-size: 14.5px; }
.checklist li::before { content: "○"; color: var(--gold); font-size: 11px; }

.prompt-cards { display: grid; gap: 8px; margin: 20px 0; }
.prompt-card { background: var(--paper); border: 1px solid var(--line); padding: 13px 16px 13px 46px;
  position: relative; font-family: var(--mono); font-size: 12.5px; line-height: 1.55; color: var(--ink); }
.prompt-card .idx { position: absolute; left: 14px; top: 13px; font-weight: 700; color: var(--accent-ink); font-size: 11px; }

.photo-slot { background: repeating-linear-gradient(45deg, var(--line) 0 1px, transparent 1px 12px);
  border: 1px dashed var(--line); aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 11px; color: var(--muted); text-align: center; padding: 20px; margin: 20px 0; }

.photo-real { width: 100%; aspect-ratio: 4/3; object-fit: cover; border: 1px solid var(--line); margin: 20px 0 6px; display: block; }
.photo-caption { font-family: var(--mono); font-size: 10.5px; color: var(--muted); letter-spacing: .02em; margin: 0 0 20px; }

.course-hook { background: var(--paper); border: 1px solid var(--gold); padding: 22px 26px; margin: 30px 0; }
.course-hook .tag { font-family: var(--mono); font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--gold); }
.course-hook p { margin: 8px 0 0; font-size: 14px; }

.sheet-footer { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 10.5px;
  letter-spacing: .06em; color: var(--muted); text-transform: uppercase; margin-top: 52px; padding-top: 14px; border-top: 1px solid var(--line); }

/* ---- LANDING / WAITLIST ---- */
.land-nav { display: flex; align-items: center; justify-content: space-between; padding: 26px 56px; }
.land-nav .id { font-family: var(--mono); font-size: 12.5px; letter-spacing: .1em; display: flex; align-items: center; gap: 9px; }
.land-nav .id::before { content: ""; width: 7px; height: 7px; background: var(--accent); }
.land-nav .cta-mini { font-family: var(--mono); font-size: 11.5px; text-transform: uppercase; letter-spacing: .1em;
  color: var(--ink); border: 1px solid var(--line); padding: 9px 16px; text-decoration: none; }

.hero { padding: 20px 56px 80px; display: grid; grid-template-columns: 1.05fr .95fr; gap: 60px; align-items: center; }
.hero .kicker { font-family: var(--mono); font-size: 12px; letter-spacing: .16em; text-transform: uppercase; color: var(--gold); margin-bottom: 24px; }
.hero h1 { font-family: var(--serif); font-weight: 340; font-size: clamp(40px, 5vw, 66px); line-height: 1.0;
  letter-spacing: -0.015em; margin: 0 0 26px; text-wrap: balance; }
.hero h1 em { color: var(--accent-ink); font-style: italic; font-weight: 500; }
.hero .sub { font-size: 18px; color: var(--muted); max-width: 46ch; margin: 0 0 36px; }
.btn { display: inline-flex; align-items: center; gap: 10px; background: var(--accent); color: var(--paper-raised);
  text-decoration: none; font-family: var(--mono); font-size: 13px; letter-spacing: .08em; text-transform: uppercase; padding: 17px 30px; border: none; cursor: pointer; }
.btn::after { content: "→"; }
.btn.ghost { background: transparent; color: var(--ink); border: 1px solid var(--line); }
.btn.ghost::after { content: ""; }

.viewfinder { aspect-ratio: 4/5; position: relative; background: radial-gradient(120% 90% at 30% 20%, #3a2a22 0%, #18130e 55%, #0c0906 100%); }
.viewfinder .reticle { position: absolute; inset: 0; }
.viewfinder .reticle::before, .viewfinder .reticle::after { content: ""; position: absolute; background: rgba(231,225,210,.35); }
.viewfinder .reticle::before { left: 50%; top: 46%; width: 1px; height: 8%; transform: translate(-50%,-50%); }
.viewfinder .reticle::after { top: 50%; left: 46%; height: 1px; width: 8%; transform: translate(-50%,-50%); }
.viewfinder .rec { position: absolute; top: 22px; left: 22px; display: flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 11px; letter-spacing: .1em; color: #E7E1D2; }
.viewfinder .rec .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
.viewfinder .tc-big { position: absolute; bottom: 24px; left: 24px; font-family: var(--mono); color: #E7E1D2;
